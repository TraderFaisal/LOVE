<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled 3D Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #videoElement { display: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-size: 24px; }
        #footer { position: absolute; bottom: 10px; right: 10px; color: rgba(255, 255, 255, 0.5); font-size: 12px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="loading">Loading Camera & AI Models...</div>
    <div id="ui">
        <h2>Interactive Particle System</h2>
        <p>🖐️ Move hand to change color</p>
        <p>🤏 Pinch to expand/contract</p>
        <p>👆 Pinch & Release to switch shapes</p>
        <p>Current Shape: <span id="shapeName">Sphere</span></p>
    </div>
    <video id="videoElement" autoplay playsinline></video>
    <div id="footer">Set in down DEV t.me/@TraderFasialAhmed</div>

    <script>
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- PARTICLE DATA & SHAPES ---
        const PARTICLE_COUNT = 4000;
        const geometry = new THREE.BufferGeometry();
        const currentPositions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        
        const shapes = {
            sphere: new Float32Array(PARTICLE_COUNT * 3),
            heart: new Float32Array(PARTICLE_COUNT * 3),
            saturn: new Float32Array(PARTICLE_COUNT * 3),
            flower: new Float32Array(PARTICLE_COUNT * 3),
            fireworks: new Float32Array(PARTICLE_COUNT * 3)
        };

        // Generate Shape Geometries
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const i3 = i * 3;
            
            // 1. Sphere
            const phi = Math.acos( -1 + ( 2 * i ) / PARTICLE_COUNT );
            const theta = Math.sqrt( PARTICLE_COUNT * Math.PI ) * phi;
            const rSphere = 15;
            shapes.sphere[i3] = rSphere * Math.cos(theta) * Math.sin(phi);
            shapes.sphere[i3+1] = rSphere * Math.sin(theta) * Math.sin(phi);
            shapes.sphere[i3+2] = rSphere * Math.cos(phi);

            // 2. Heart
            const t = Math.PI * 2 * (i / PARTICLE_COUNT);
            shapes.heart[i3] = 16 * Math.pow(Math.sin(t), 3);
            shapes.heart[i3+1] = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            shapes.heart[i3+2] = (Math.random() - 0.5) * 5; 

            // 3. Saturn (Sphere + Ring)
            if (i < PARTICLE_COUNT * 0.6) {
                // Planet
                const p = Math.acos( -1 + ( 2 * (i / 0.6) ) / PARTICLE_COUNT );
                const th = Math.sqrt( PARTICLE_COUNT * 0.6 * Math.PI ) * p;
                shapes.saturn[i3] = 10 * Math.cos(th) * Math.sin(p);
                shapes.saturn[i3+1] = 10 * Math.sin(th) * Math.sin(p);
                shapes.saturn[i3+2] = 10 * Math.cos(p);
            } else {
                // Ring
                const angle = Math.random() * Math.PI * 2;
                const radius = 15 + Math.random() * 10;
                shapes.saturn[i3] = Math.cos(angle) * radius;
                shapes.saturn[i3+1] = (Math.random() - 0.5) * 2; // Flat Y
                shapes.saturn[i3+2] = Math.sin(angle) * radius;
            }

            // 4. Flower (Rose curve)
            const k = 5; // Petals
            const angleFl = i * 0.1;
            const rFlower = 20 * Math.cos(k * angleFl);
            shapes.flower[i3] = rFlower * Math.cos(angleFl) + (Math.random()-0.5)*2;
            shapes.flower[i3+1] = rFlower * Math.sin(angleFl) + (Math.random()-0.5)*2;
            shapes.flower[i3+2] = (Math.random() - 0.5) * 5;

            // 5. Fireworks (Explosion burst)
            const fwRadius = 30 * Math.random();
            const fwPhi = Math.acos((Math.random() * 2) - 1);
            const fwTheta = Math.random() * Math.PI * 2;
            shapes.fireworks[i3] = fwRadius * Math.sin(fwPhi) * Math.cos(fwTheta);
            shapes.fireworks[i3+1] = fwRadius * Math.sin(fwPhi) * Math.sin(fwTheta);
            shapes.fireworks[i3+2] = fwRadius * Math.cos(fwPhi);

            // Initialize at Sphere
            currentPositions[i3] = shapes.sphere[i3];
            currentPositions[i3+1] = shapes.sphere[i3+1];
            currentPositions[i3+2] = shapes.sphere[i3+2];
            targetPositions[i3] = shapes.sphere[i3];
            targetPositions[i3+1] = shapes.sphere[i3+1];
            targetPositions[i3+2] = shapes.sphere[i3+2];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

        // Particle Material
        const material = new THREE.PointsMaterial({
            size: 0.4,
            color: 0x00ffcc,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- INTERACTION LOGIC ---
        let currentShapeIndex = 0;
        const shapeKeys = Object.keys(shapes);
        let expansionFactor = 1.0;
        let isPinching = false;
        let targetColorHSL = { h: 0.5, s: 1.0, l: 0.5 };

        function switchShape() {
            currentShapeIndex = (currentShapeIndex + 1) % shapeKeys.length;
            const shapeName = shapeKeys[currentShapeIndex];
            document.getElementById('shapeName').innerText = shapeName.charAt(0).toUpperCase() + shapeName.slice(1);
            
            const newShape = shapes[shapeName];
            for(let i=0; i<PARTICLE_COUNT * 3; i++) {
                targetPositions[i] = newShape[i];
            }
        }

        // --- MEDIAPIPE HAND TRACKING ---
        const videoElement = document.getElementById('videoElement');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Track Thumb tip (4) and Index tip (8)
                const thumb = landmarks[4];
                const index = landmarks[8];

                // 1. Calculate Pinch (Distance) for Expansion
                const dx = thumb.x - index.x;
                const dy = thumb.y - index.y;
                const dz = thumb.z - index.z;
                const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);
                
                // Map distance to expansion scale (closer = smaller scale, further = larger)
                expansionFactor = THREE.MathUtils.lerp(expansionFactor, distance * 5, 0.1);

                // Check for Pinch Click (Cycle templates)
                if (distance < 0.05) {
                    if (!isPinching) isPinching = true;
                } else {
                    if (isPinching) {
                        switchShape();
                        isPinching = false;
                    }
                }

                // 2. Map Hand X/Y position to Color
                const handX = landmarks[0].x; // Wrist position
                targetColorHSL.h = handX; // Hue maps to X position
            } else {
                // Default fallback if no hand
                expansionFactor = THREE.MathUtils.lerp(expansionFactor, 1.0, 0.05);
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Interpolate positions to target shape + Apply expansion factor
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                const targetVal = targetPositions[i] * expansionFactor;
                positions[i] += (targetVal - positions[i]) * 0.05; // Lerp speed
            }
            geometry.attributes.position.needsUpdate = true;

            // Slowly rotate the entire system
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;

            // Smooth color transition
            const currentColor = material.color.getHSL({});
            material.color.setHSL(
                THREE.MathUtils.lerp(currentColor.h, targetColorHSL.h, 0.05),
                targetColorHSL.s,
                targetColorHSL.l
            );

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
